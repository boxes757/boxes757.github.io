# Site identity
locale: "en-US"
site_theme: "default"
title: "Zihao He"
title_separator: "-"
name: &name "Zihao He"
description: &description "Academic homepage of Zihao He, focusing on compressed sensing, sparse signal recovery, and nonconvex optimization."
url: "https://boxes757.github.io"
baseurl: ""
repository: "boxes757/boxes757.github.io"

# Author profile shown in the sidebar
author:
  avatar: "https://avatars.githubusercontent.com/u/63056376?v=4"
  name: "Zihao He"
  pronouns:
  bio: "M.S.–Ph.D. Candidate in Cyberspace Security"
  location: "Guangzhou, China"
  employer: "Jinan University"
  uri:
  email:
  googlescholar: "https://scholar.google.com/citations?user=daMAUUkAAAAJ&hl=en"
  github: "boxes757"

# Publication categories
publication_category:
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"

# General site settings
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false
comments:
  provider: false
atom_feed:
  hide: true
analytics:
  provider: false

# Files processed by Jekyll
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Markdown conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Content collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Default layouts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: false

# Styling and URLs
sass:
  sass_dir: _sass
  style: compressed
permalink: /:categories/:title/
timezone: Asia/Shanghai

# GitHub Pages-compatible plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archive pages
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML compression
compress_html:
  clippings: all
  ignore:
    envs: development
